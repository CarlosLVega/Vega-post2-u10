# Proyecto evaluado por SonarQube en el laboratorio Post-Contenido 2.
sonar.projectKey=productos-service
sonar.projectName=Productos Service
sonar.projectVersion=1.0

# Codigo fuente, pruebas y binarios generados por Maven.
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Reporte XML generado por JaCoCo durante mvn clean verify.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Codificacion del proyecto.
sonar.sourceEncoding=UTF-8
